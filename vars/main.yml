---
#GLOBAL VARIABLES
#These variables can be overwritten at the host_vars level 
#Discover
iosl2sstig_discover: true
#Evaluate
iosl2sstig_cat1_evaluate: false
iosl2sstig_cat2_evaluate: true
iosl2sstig_cat3_evaluate: false
#Remediate
iosl2sstig_cat1_remediate: false
iosl2sstig_cat2_remediate: true
iosl2sstig_cat3_remediate: false

#This section is to enable the roles to provide CKLB formatted file for STIG Viewer
# To enable or disable this functionality
stig_viewer: true

#Comment for CKLB
comment: 'Evaluating IOSXE STIG'

#Server for CKLB files
cklb_server: laptop

#Path for CKLB folder
cklb_path: /home/{{ cklb_user }}/cklb

#CKLB User
cklb_user: tdubiel

#The cklb_password is used to write the STIG Viewer check files
# Each file is saved with a timestamp 
#cklb_password: changeme

#Git Repo URL
#The token/password should be defined in an Ansible VAULT or AAP credential
# password: changeme
#token: 
git_url: "http://gitea:{{password}}@aap:3000/gitea/STIG-CISCO-IOS-XE-L2S.git"


# These variables correspond with the STIG IDs defined in the STIG and allows you to enable/disable specific rules.
# PLEASE NOTE: These work in coordination with the cat1, cat2, cat3 group variables. You must enable an entire group
# in order for the variables below to take effect.

# CAT 1 rules
SV_220649r863283: true #CISC-L2-000020 | 802.1x authentication 

# CAT 2 rules
SV_220650r539671: false #CISC-L2-000030 | VLAN Trunk Protocol 
SV_220651r1107171: false #CISC-L2-000040 | DOS
SV_220656r856278: true #CISC-L2-000100 | BPDU Guard
SV-220657r856279: false #CISC-L2-000110 | (STP) loop guard
SV-220658r856280: false #CISC-L2-000120 | (CAM)Content Addressable Memory table 
SV-220659r928999: false #CISC-L2-000130 | DHCP snooping 
SV-220660r929001: false #CISC-L2-000140 | IP Source Guard 
SV-220661r929003: false #CISC-L2-000150 | Dynamic ARP
SV-220664r539671: false #CISC-L2-000180 | Rapid STP 
SV-220665r539671: false #CISC-L2-000190 | (UDLD )Unidirectional Link Detection 
SV-220666r539671: false #CISC-L2-000200 | (DTP) Dynamic Trunk Protocol 
SV-220667r991904: false #CISC-L2-000210 | unused VLAN
SV-220668r991905: false #CISC-L2-000220 | default VLAN host
SV-220669r991906: false #CISC-L2-000230 | default VLAN pruned
SV-220670r991907: false #CISC-L2-000240 | default VLAN mgmt
SV-220671r991908: false #CISC-L2-000250 | untrusted trunk ports
SV-220670r991909: false #CISC-L2-000260 | trunk native VLAN

# CAT 3 rules
SV-220655r917683: false #CISC-L2-000090 | Root Guard
SV-220662r648766: false #CISC-L2-000160 | Storm Control 
SV-220663r929005: false #CISC-L2-000170 | IGMP or MLD Snooping
SV-220673r991910: false #CISC-L2-000270 | Access Native Vlan

# Cat 1

# SV_220649r863283 | CISC-L2-000020 | 802.1x authentication
# CISC-L2-000020 
# Settings below set the RADIUS SERVER indivigual names, ip, and key. 
iosstig_radius_server_one_name: "RADIUS_1"
iosstig_radius_server_one_ip: "192.168.68.250"
iosstig_radius_server_one_key: "key_here"
iosstig_radius_server_two_name: "RADIUS_2"
iosstig_radius_server_two_ip: "192.168.68.251"
iosstig_radius_server_two_key: "key_here"
#iosstig_radius_group_name is the group name for the Radius servers.
iosstig_radius_group_name: "RADIUS_SERVERS"
# iosstig_auth_hostmode is the setting for the host facing interfaces.
# Note: Single-host is the default. Host-mode multi-domain (for VoIP phone plus PC) or 
# multi-auth (multiple PCs connected to a hub) can be configured as alternatives.
# Below Are All Valid Options
#  multi-auth    Multiple Authentication Mode
#  multi-domain  Multiple Domain Mode
#  multi-host    Multiple Host Mode
#  single-host   SINGLE HOST Mode
iosstig_auth_hostmode: "single-host"

# Cat 2

#SV-220650r539671 | CISC-L2-000030 | VLAN Trunk Protocol 
# CISC-L2-000030
# iosstig_vtp_user_password is the password you will change for vtp password. 
# CHANGE THE DEFAULT!!!!!!!!!!!!!!!
# MAKE SURE TO VAULT OR CREATE AAP CREDENTIALS for PASSWORDS, PLAIN TEXT PASSWORDS ARE BAD.
iosstig_vtp_user_password: changeme

#EXAMPLE VAULT
#~/code/$ ansible-vault encrypt_string 'changeme' --name 'iosstig_vtp_user_password'
