---
- name: STIG Compliance Lifecycle for Cisco IOS-XE L2 Switches
  hosts: cisco_switches
  gather_facts: false
  connection: network_cli

  tasks:
    # -------------------------------------------------------------------------
    # ROLE 1: DISCOVERY
    # -------------------------------------------------------------------------
    - name: Phase 1 | Discover Network Baseline
      ansible.builtin.import_role:
        name: discover
      tags: 
        - discover
        - baseline

    # -------------------------------------------------------------------------
    # ROLE 2: EVALUATE
    # -------------------------------------------------------------------------
    - name: Phase 2 | Evaluate Compliance and Generate CKLB Reports
      ansible.builtin.import_role:
        name: evaluate
      tags: 
        - evaluate
        - audit
        - check

    # -------------------------------------------------------------------------
    # ROLE 3: REMEDIATE
    # -------------------------------------------------------------------------
    - name: Phase 3 | Remediate Vulnerabilities and Harden Configuration
      ansible.builtin.import_role:
        name: remediate
      tags: 
        - remediate
        - harden
        - fix

  # Optional Post-Run Summary
  post_tasks:
    - name: Summary | Execution Complete
      ansible.builtin.debug:
        msg: 
          - "STIG processing finished for {{ inventory_hostname }}."
          - "Check /tmp/ for generated .cklb files if the evaluate role was run."
      tags: always
