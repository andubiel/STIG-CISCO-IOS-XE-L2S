---
- name: |
   'Role: Discover | 
    Retrieve a repository from a distant location and make it available to the local EE'
  ansible.scm.git_retrieve:
    origin:
      url: "{{ git_url }}"
    parent_directory: /tmp
    branch:
        name: main
        duplicate_detection: no  
  run_once: true
  register: repository
  delegate_to: localhost
  no_log: true

- name: |
   'Role: Discover | 
    Delete host_vars'
  ansible.builtin.file:
   path: "{{ repository['path'] }}/host_vars/{{ inventory_hostname }}/"
   state: absent
  delegate_to: localhost

- name: |
   'Role: Discover | Publish the changes'
  ansible.scm.git_publish:
    path: "{{ repository['path'] }}"
  run_once: true
  delegate_to: localhost

- name: |
   'Role: Discover | 
    Retrieve a repository from a distant location and make it available to the local EE'
  ansible.scm.git_retrieve:
    origin:
      url: "{{ git_url }}"
    parent_directory: /tmp
    branch:
        name: main
        duplicate_detection: no  
  run_once: true
  register: repository
  delegate_to: localhost
  no_log: true

- name: |
   'Role: Discover | 
    Create host_vars'
  ansible.builtin.file:
   path: "{{ repository['path'] }}/host_vars/{{ inventory_hostname }}/"
   state: directory
  delegate_to: localhost

- name:  'Role: Discover | 
         Create Vlans if the do not exist'
  cisco.ios.ios_vlans:
    config:
      - vlan_id: "{{ iosstig_vlan1_replacement | default(omit) }}"
        state: active
      - vlan_id: "{{ iosstig_blackhole_vlan | default(omit) }}"
        state: suspend
      - vlan_id: "{{ iosstig_native_vlan | default(omit) }}"
        state: active
      - vlan_id: "{{ iosstig_mgmt_vlan | default(omit) }}"
        state: active
    state: merged
  when: (iosstig_vlan1_replacement is defined) or 
        (iosstig_blackhole_vlan is defined) or 
        (iosstig_native_vlan is defined) or 
        (iosstig_mgmt_vlan is defined)

- name: 'Role: Discover | Gather interfaces resources'
  cisco.ios.ios_facts:
    gather_subset:
      - "!all"
      - "!min"
    gather_network_resources:
      - l2_interfaces 
      - interfaces  

- name: 'Role: Discover | Set L2 Port Filter'
  set_fact:
    all_l2_ports: "{{ ansible_facts.network_resources.l2_interfaces | default([]) }}"
    all_phys_interfaces: "{{ ansible_facts.network_resources.interfaces | default([]) }}"
  delegate_to: localhost

- name: 'Role: Discover | Gather Operational VLANs'
  cisco.ios.ios_vlans:
    state: gathered
  register: gathered_vlans

- name: 'Role: Discover | Write Data VLANs File'
  ansible.builtin.copy:
    content: |
      ---
      # Operational User VLANs discovered on {{ inventory_hostname }}
      # (Excluding default, Blackhole, and Native VLAN)
      iosstig_user_vlans:
      {{ gathered_vlans.gathered 
         | map(attribute='vlan_id') 
         | map('int')
         | reject('in', [1, 1002, 1003, 1004, 1005, iosstig_blackhole_vlan | int, iosstig_native_vlan | int]) 
         | unique | sort | list | to_nice_yaml }}
    dest: "{{ repository['path'] }}/host_vars/{{ inventory_hostname }}/iosstig_user_vlans.yaml"
  delegate_to: localhost
  when: gathered_vlans.gathered is defined and gathered_vlans.gathered | length > 0

- name: 'Role: Discover | Write Voice VLANs File'
  ansible.builtin.copy:
    content: |
      ---
      iosstig_voice_vlans:
      {{ all_l2_ports 
         | selectattr('voice.vlan', 'defined') 
         | map(attribute='voice.vlan') 
         | unique | sort | list | to_nice_yaml }}
    dest: "{{ repository['path'] }}/host_vars/{{ inventory_hostname }}/iosstig_voice_vlans.yaml"
  delegate_to: localhost
  when: all_l2_ports | selectattr('voice.vlan', 'defined') | list | length > 0

- name: 'Role: Discover | Write Access Ports File'
  ansible.builtin.copy:
    content: |
      ---
      iosstig_access_ports:
      {% set standard_access = all_l2_ports | selectattr('mode', 'defined') | selectattr('mode', 'equalto', 'access') | rejectattr('voice', 'defined') | rejectattr('access.vlan', 'defined') | list %}
      {% set configured_access = all_l2_ports | selectattr('mode', 'defined') | selectattr('mode', 'equalto', 'access') | selectattr('access.vlan', 'defined') | rejectattr('access.vlan', 'equalto', 1) | list %}
      {{ (standard_access + configured_access) | to_nice_yaml }}
    dest: "{{ repository['path'] }}/host_vars/{{ inventory_hostname }}/iosstig_access_ports.yaml"
  delegate_to: localhost
  when: all_l2_ports | selectattr('mode', 'defined') | selectattr('mode', 'equalto', 'access') | list | length > 0
 
- name: 'Role: Discover | Write Voice Ports File'
  ansible.builtin.copy:
    content: |
      ---
      iosstig_voice_ports:
      {{ all_l2_ports 
         | selectattr('voice', 'defined') 
         | list | to_nice_yaml }}
    dest: "{{ repository['path'] }}/host_vars/{{ inventory_hostname }}/iosstig_voice_ports.yaml"
  delegate_to: localhost
  when: all_l2_ports | selectattr('voice', 'defined') | list | length > 0

- name: 'Role: Discover | Write Trunk Ports File'
  ansible.builtin.copy:
    content: |
      ---
      iosstig_trunk_ports:
      {{ all_l2_ports 
         | selectattr('mode', 'defined') 
         | selectattr('mode', 'equalto', 'trunk') 
         | list | to_nice_yaml }}
    dest: "{{ repository['path'] }}/host_vars/{{ inventory_hostname }}/iosstig_trunk_ports.yaml"
  delegate_to: localhost
  when: all_l2_ports | selectattr('mode', 'defined') | selectattr('mode', 'equalto', 'trunk') | list | length > 0
  
- name: 'Role: Discover | Write Unused Ports File'
  ansible.builtin.copy:
    content: |
      ---
      iosstig_unused_ports:
      {{ all_phys_interfaces 
         | selectattr('enabled', 'defined') 
         | selectattr('enabled', 'equalto', false) 
         | rejectattr('name', 'search', 'Vlan|Loopback|App') 
         | list | to_nice_yaml }}
    dest: "{{ repository['path'] }}/host_vars/{{ inventory_hostname }}/iosstig_unused_ports.yaml"
  delegate_to: localhost
  when: all_phys_interfaces | selectattr('enabled', 'equalto', false) | rejectattr('name', 'search', 'Vlan|Loopback|App') | list | length > 0

- name: |
   'Role: Discover | Publish the changes'
  ansible.scm.git_publish:
    path: "{{ repository['path'] }}"
  run_once: true
  delegate_to: localhost
