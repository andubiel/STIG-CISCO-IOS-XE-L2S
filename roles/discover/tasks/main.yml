---
- name: |
   'Role: Discover | 
    Retrieve a repository from a distant location and make it available to the local EE'
  ansible.scm.git_retrieve:
    origin:
      url: "{{ git_url }}"
    parent_directory: /tmp
    branch:
        name: main
        duplicate_detection: no  
  run_once: true
  register: repository
  delegate_to: localhost
  no_log: true

- name: |
   'Role: Discover | 
    Delete host_vars files'
  ansible.builtin.file:
   path: "{{ repository['path'] }}/host_vars/{{ inventory_hostname }}/{{ item }}.yaml"
   state: absent
  delegate_to: localhost
  loop:
   - iosstig_access_ports
   - iosstig_voice_ports
   - iosstig_trunk_ports

- name: 'Role: Discover | Gather interfaces resources'
  cisco.ios.ios_facts:
    gather_subset:
      - "!all"
      - "!min"
    gather_network_resources:
      - l2_interfaces 
  # This registers ansible_facts.network_resources.l2_interfaces

- name: 'Role: Discover | Set L2 Port Filter'
  set_fact:
    # We use | default([]) in case l2_interfaces wasn't gathered or is empty
    all_l2_ports: "{{ ansible_facts.network_resources.l2_interfaces | default([]) }}"
  delegate_to: localhost

- name: 'Role: Discover | Write Access Ports File'
  ansible.builtin.copy:
    content: |
      ---
      iosstig_access_ports:
      {{ all_l2_ports 
         | selectattr('mode', 'defined') 
         | selectattr('mode', 'equalto', 'access') 
         | rejectattr('voice', 'defined') 
         | list | to_nice_yaml }}
    dest: "{{ repository['path'] }}/host_vars/{{ inventory_hostname }}/iosstig_access_ports.yaml"
  delegate_to: localhost
  # Only run if we actually found access ports that aren't voice ports
  when: all_l2_ports | selectattr('mode', 'defined') | selectattr('mode', 'equalto', 'access') | rejectattr('voice', 'defined') | list | length > 0

- name: 'Role: Discover | Write Voice Ports File'
  ansible.builtin.copy:
    content: |
      ---
      iosstig_voice_ports:
      {{ all_l2_ports 
         | selectattr('voice', 'defined') 
         | list | to_nice_yaml }}
    dest: "{{ repository['path'] }}/host_vars/{{ inventory_hostname }}/iosstig_voice_ports.yaml"
  delegate_to: localhost
  # Only run if voice attributes exist on any port
  when: all_l2_ports | selectattr('voice', 'defined') | list | length > 0

- name: 'Role: Discover | Write Trunk Ports File'
  ansible.builtin.copy:
    content: |
      ---
      iosstig_trunk_ports:
      {{ all_l2_ports 
         | selectattr('mode', 'defined') 
         | selectattr('mode', 'equalto', 'trunk') 
         | list | to_nice_yaml }}
    dest: "{{ repository['path'] }}/host_vars/{{ inventory_hostname }}/iosstig_trunk_ports.yaml"
  delegate_to: localhost
  # Only run if trunk ports exist
  when: all_l2_ports | selectattr('mode', 'defined') | selectattr('mode', 'equalto', 'trunk') | list | length > 0

- name: |
   'Role: Discover | Publish the changes'
  ansible.scm.git_publish:
    path: "{{ repository['path'] }}"
  run_once: true
  delegate_to: localhost

   





