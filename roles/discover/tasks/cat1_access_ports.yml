---
- name: |
   'Role: Discover | Severity: High (Cat I) | Group ID: V-220649 | Rule ID: SV-220649r863283 | STIG ID: CISC-L2-000020 | SRG ID: SRG-NET-000148-L2S-000015
    Retrieve a repository from a distant location and make it available to the local EE'
  ansible.scm.git_retrieve:
    origin:
      url: "{{ git_url }}"
    parent_directory: /tmp
    branch:
        name: main
        duplicate_detection: no  
  run_once: true
  register: repository
  delegate_to: localhost
  no_log: true

- name: |
   'Role: Discover | Severity: High (Cat I) | Group ID: V-220649 | Rule ID: SV-220649r863283 | STIG ID: CISC-L2-000020 | SRG ID: SRG-NET-000148-L2S-000015
    Delete host_vars files'
  ansible.builtin.file:
   path: "{{ repository['path'] }}/host_vars/{{ inventory_hostname }}/{{ item }}.yaml"
   state: absent
  delegate_to: localhost
  loop:
   - iosstig_access_ports
   - iosstig_voice_ports

- name: |
    'Role: Discover | Severity: High (Cat I) | Group ID: V-220649 | Rule ID: SV-220649r863283 | STIG ID: CISC-L2-000020 | SRG ID: SRG-NET-000148-L2S-000015
     Gather interfaces resources'
  cisco.ios.ios_facts:
    gather_subset:
      - "!all"
      - "!min"
    gather_network_resources:
      - interfaces
      - l2_interfaces 

- name: | 
    'Role: Discover | Severity: High (Cat I) | Group ID: V-220649 | Rule ID: SV-220649r863283 | STIG ID: CISC-L2-000020 | SRG ID: SRG-NET-000148-L2S-000015
     Set Access Vlan Filter'
  set_fact:
    access_ports: "{{ ansible_facts.network_resources.l2_interfaces | selectattr('mode', 'defined' )}}"
  delegate_to: localhost
   
- name: |
    'Role: Discover | Severity: High (Cat I) | Group ID: V-220649 | Rule ID: SV-220649r863283 | STIG ID: CISC-L2-000020 | SRG ID: SRG-NET-000148-L2S-000015
     List the Access ports based on match'
  ansible.builtin.debug:
    msg:
        - "host_name: {{ inventory_hostname }}"
        - "{{ access_ports | selectattr('mode', 'equalto', 'access') | map(attribute='name') }}"
  delegate_to: localhost
 
- name: |
    'Role: Discover | Severity: High (Cat I) | Group ID: V-220649 | Rule ID: SV-220649r863283 | STIG ID: CISC-L2-000020 | SRG ID: SRG-NET-000148-L2S-000015
     Create host_vars directory'
  ansible.builtin.file:
   path: "{{ repository['path'] }}/host_vars/{{ inventory_hostname }}/"
   state: directory
  run_once: true
  delegate_to: localhost

- name: |
    'Role: Discover | Severity: High (Cat I) | Group ID: V-220649 | Rule ID: SV-220649r863283 | STIG ID: CISC-L2-000020 | SRG ID: SRG-NET-000148-L2S-000015
     Copy using iosstig_access_ports content
  ansible.builtin.copy:
    content: |
     iosstig_access_ports:
     {{ access_ports
        | selectattr('mode', 'equalto', 'access')
        | rejectattr('voice.vlan', 'defined')
        | to_nice_yaml }}
    dest: "{{ repository['path'] }}/host_vars/{{ inventory_hostname }}/iosstig_access_ports.yaml"
  delegate_to: localhost

- name: |
    'Role: Discover | Severity: High (Cat I) | Group ID: V-220649 | Rule ID: SV-220649r863283 | STIG ID: CISC-L2-000020 | SRG ID: SRG-NET-000148-L2S-000015
     Copy using iosstig_voice_ports content'
  ansible.builtin.copy:
    content: |
     iosstig_voice_ports:
     {{ access_ports
        | selectattr('voice.vlan', 'defined')
        | to_nice_yaml }}
    dest: "{{ repository['path'] }}/host_vars/{{ inventory_hostname }}/iosstig_voice_ports.yaml"
  delegate_to: localhost
  when: access_ports | selectattr('voice.vlan', 'defined') | length > 0

- name: |
   'Role: Discover | Severity: High (Cat I) | Group ID: V-220649 | Rule ID: SV-220649r863283 | STIG ID: CISC-L2-000020 | SRG ID: SRG-NET-000148-L2S-000015
    Publish the changes'
  ansible.scm.git_publish:
    path: "{{ repository['path'] }}"
  run_once: true
  delegate_to: localhost



   



