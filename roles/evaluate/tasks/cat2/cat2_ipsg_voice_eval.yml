---
- name: >
    'Role: Evaluate | Severity: Medium (Cat II) | Group ID: V-220660 | Rule ID:SV-220660r929001 | STIG ID: CISC-L2-000140 | SRG ID: SRG-NET-000362-L2S-000026 | Voice | IP Source Guard
     show run interface'
  cisco.ios.ios_command:
    commands:
      - 'show run int {{ show_item.name }} | exclude Building configuration...|Current configuration'
  loop: "{{ iosstig_voice_ports }}"
  loop_control:
    loop_var: show_item
  register: voice_ipsg

- name: >
     'Role: Evaluate | Severity: Medium (Cat II) | Group ID: V-220660 | Rule ID:SV-220660r929001 | STIG ID: CISC-L2-000140 | SRG ID: SRG-NET-000362-L2S-000026 | Voice | IP Source Guard
     Create clean configuration string'
  ansible.builtin.set_fact:
   missing_ipsg_voice: >-
      {{ voice_ipsg.results | 
         selectattr('stdout', 'defined') | 
         rejectattr('stdout.0', 'search', 'ip verify source') | 
         map(attribute='show_item.name') | list 
         | unique }}
  delegate_to: localhost
  changed_when: missing_ipsg_voice | length > 0
  notify: "cat2_cisc_l2_000140_voice_Fail"

- name: "STIG | Show findings | ipsg | voice "
  ansible.builtin.debug:
    msg: "The following interfaces are non-compliant: {{ missing_ipsg_voice }}"
  when: missing_ipsg_voice | length > 0
  delegate_to: localhost

- name: >
    'Role: Evaluate | Severity: Medium (Cat II) | Group ID: V-220660 | Rule ID:SV-220660r929001 | STIG ID: CISC-L2-000140 | SRG ID: SRG-NET-000362-L2S-000026 | Voice | IP Source Guard
    Trigger handler if NO compliance violation occurred'
  debug:
    msg: "No compliance violation detected, notifying handler that Rule ID: SV-220660r929001  Passed"
  # Trigger this only if the previous task did NOT change
  when: missing_ipsg_voice | length == 0
  changed_when: true
  notify: "cat2_cisc_l2_000140_voice_Pass"
