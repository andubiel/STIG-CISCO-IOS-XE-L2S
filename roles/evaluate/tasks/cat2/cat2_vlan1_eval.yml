
---
# CISC-L2-000220 - VLAN 1 No Access Ports Evaluation
# This task ensures no active access ports are assigned to the default VLAN.
- name: 'Role: Evaluate | Severity: Medium (Cat II) | Group ID: V-220668 | Rule ID: SV-220668r991905 | STIG ID: CISC-L2-000220 | SRG-NET-000512-L2S-000008 | VLAN 1 | Initialize Port Lists'
  ansible.builtin.set_fact:
    iosstig_default_ports_list: []
    vlan1_violators_admin_up: []

- name: 'Role: Evaluate | Severity: Medium (Cat II) | Group ID: V-220668 | Rule ID: SV-220668r991905 | STIG ID: CISC-L2-000220 | SRG-NET-000512-L2S-000008 | VLAN 1 | Get VLAN Database'
  cisco.ios.ios_command:
    commands:
      - show vlan brief
  register: vlan_brief_out

- name: 'Role: Evaluate | Severity: Medium (Cat II) | SV-220668 | Parse Ports from Database'
  ansible.builtin.set_fact:
    iosstig_default_ports_list: >-
      {%- set port_list = [] -%}
      {# Iterate through every line of the vlan brief output #}
      {%- for line in vlan_brief_out.stdout[0].split('\n') -%}
        {# Find the line starting with VLAN 1 'default' #}
        {%- if line is match('^1\s+default\s+active.*') -%}
          {# Split the line by the status 'active' and take everything to the right #}
          {%- set port_string = line.split('active')[-1] | trim -%}
          {%- for port in port_string.split(',') -%}
            {%- if port | trim -%}
              {%- set _ = port_list.append({'name': port | trim}) -%}
            {%- endif -%}
          {%- endfor -%}
        {%- endif -%}
      {%- endfor -%}
      {{ port_list }}
  delegate_to: localhost

- name: 'Role: Evaluate | Severity: Medium (Cat II) | Group ID: V-220668 | Rule ID: SV-220668r991905 | STIG ID: CISC-L2-000220 | SRG-NET-000512-L2S-000008 | VLAN 1 | Get Interface Admin Status'
  cisco.ios.ios_command:
    commands:
      - show interfaces status
  register: int_status_out
  when: iosstig_default_ports_list | length > 0

- name: 'Role: Evaluate | CISC-L2-000220 | Filter for Admin Up Violators'
  ansible.builtin.set_fact:
    vlan1_violators_admin_up: >-
      {%- set active_violators = [] -%}
      {%- set status_output = int_status_out.stdout[0].split('\n') -%}
      {%- for violator in iosstig_default_ports_list | default([]) -%}
        {%- set v_name = violator.name | trim -%}
        {# Find the specific line for this interface #}
        {%- for line in status_output -%}
          {%- if line.startswith(v_name) -%}
            {# If the line does NOT contain 'disabled', it is an active violation #}
            {%- if 'disabled' not in line -%}
              {%- set _ = active_violators.append({'name': v_name}) -%}
            {%- endif -%}
          {%- endif -%}
        {%- endfor -%}
      {%- endfor -%}
      {{ active_violators }}
  delegate_to: localhost
  when: iosstig_default_ports_list | length > 0

- name: 'Role: Evaluate | Severity: Medium (Cat II) | Group ID: V-220668 | Rule ID: SV-220668r991905 | STIG ID: CISC-L2-000220 | SRG-NET-000512-L2S-000008 | VLAN 1 | Fail Check (Active Ports Found)'
  ansible.builtin.debug:
    msg: "The following ACTIVE (No Shut) ports are in VLAN 1: {{ vlan1_violators_admin_up }}"
  when: vlan1_violators_admin_up | length > 0
  changed_when: true
  notify: "cat2_cisc_l2_000220_Fail"

- name: 'Role: Evaluate | Severity: Medium (Cat II) | Group ID: V-220668 | Rule ID: SV-220668r991905 | STIG ID: CISC-L2-000220 | SRG-NET-000512-L2S-000008 | VLAN 1 | Pass Check (No Active Ports)'
  ansible.builtin.debug:
    msg: "No ACTIVE access ports found in VLAN 1. Compliance Verified."
  when: vlan1_violators_admin_up | length == 0
  changed_when: true
  notify: "cat2_cisc_l2_000220_Pass"
