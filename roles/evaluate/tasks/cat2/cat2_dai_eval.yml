---
# CISC-L2-000150 - IP ARP Inspection Evaluation

- name: 'Role: Evaluate | Severity: Medium (Cat II) | Group ID: V-220661 | Rule ID: SV-220661r929003 | STIG ID: CISC-L2-000150 | SRG-NET-000362-L2S-000027 |
    DAI VLAN | show running-config'
  cisco.ios.ios_command:
    commands:
      - show running-config | include ip arp inspection vlan
  register: dai_vlan_out

- name: 'Role: Evaluate | Severity: Medium (Cat II) | Group ID: V-220661 | Rule ID: SV-220661r929003 | STIG ID: CISC-L2-000150 | SRG-NET-000362-L2S-000027 |
    DAI VLANs | Logical Comparison'
  ansible.builtin.set_fact:
    dai_vlan_finding: >-
      {%- set missing_vlans = [] -%}
      {# 1. Target VLANs from your discovered user list #}
      {%- set target_vlans = iosstig_user_vlans | map('int') | list -%}
      
      {# 2. Parse Switch Output for DAI #}
      {%- set active_vlans = [] -%}
      {%- if dai_vlan_out.stdout[0] -%}
        {# Extract just the IDs from 'ip arp inspection vlan 12,20-22' #}
        {%- set raw_line = dai_vlan_out.stdout[0] | regex_replace('ip arp inspection vlan ', '') | trim -%}
        {%- for part in raw_line.split(',') -%}
          {%- if '-' in part -%}
            {%- set range_parts = part.split('-') -%}
            {%- for i in range(range_parts[0]|int, range_parts[1]|int + 1) -%}
              {%- set _ = active_vlans.append(i) -%}
            {%- endfor -%}
          {%- else -%}
            {%- set _ = active_vlans.append(part|int) -%}
          {%- endif -%}
        {%- endfor -%}
      {%- endif -%}

      {# 3. Find missing VLANs #}
      {%- for vlan in target_vlans -%}
        {%- if vlan not in active_vlans -%}
          {%- set _ = missing_vlans.append(vlan) -%}
        {%- endif -%}
      {%- endfor -%}
      {{ missing_vlans }}
  delegate_to: localhost

- name: 'Role: Evaluate | Severity: Medium (Cat II) | Group ID: V-220661 | Rule ID: SV-220661r929003 | STIG ID: CISC-L2-000150 | SRG-NET-000362-L2S-000027 |
     DAI VLANs | Debug Results'
  ansible.builtin.debug:
    msg: 
      - "Target VLANs for DAI: {{ iosstig_user_vlans }}"
      - "Currently Enabled on Switch: {{ active_vlans | default('None') }}"
      - "Missing (Finding): {{ dai_vlan_finding }}"

- name: 'Role: Evaluate | Severity: Medium (Cat II) | Group ID: V-220661 | Rule ID: SV-220661r929003 | STIG ID: CISC-L2-000150 | SRG-NET-000362-L2S-000027 |
      DAI VLANs | Trigger Fail'
  ansible.builtin.debug:
    msg: "DAI is not enabled on the following required VLANs: {{ dai_vlan_finding }}"
  when: dai_vlan_finding | length > 0
  notify: "cat2_cisc_l2_000150_Fail"

- name: 'Role: Evaluate | DAI | Trigger Pass'
  ansible.builtin.debug:
    msg: " | DAI | Rule ID: SV-220661r929003 Passed"
  when: dai_vlan_finding | length == 0
  changed_when: true
  notify: "cat2_cisc_l2_000150_Pass"
