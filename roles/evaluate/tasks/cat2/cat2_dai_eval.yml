---
- name: 'Role: Evaluate | Severity: Medium (Cat II) | Group ID: V-220661 | Rule ID: SV-220661r929003 | STIG ID: CISC-L2-000150 | SRG-NET-000362-L2S-000027 |
    DAI | show running-config'
  cisco.ios.ios_command:
    commands:
      - show running-config | include ip arp inspection vlan
  register: dai_check

- name: 'Role: Evaluate | Severity: Medium (Cat II) | Group ID: V-220661 | Rule ID: SV-220661r929003 | STIG ID: CISC-L2-000150 | SRG-NET-000362-L2S-000027 |
    DAI | Identify missing configuration'
  ansible.builtin.set_fact:
    # We join the user_vlans list with commas to match Cisco's 'show run' output format
    missing_dai_commands: >-
      {{ ['ip arp inspection vlan ' ~ iosstig_user_vlans | join(',')] | 
         difference(dai_check.stdout[0].splitlines() | map('trim') | list) }}
  delegate_to: localhost
  changed_when: missing_dai_commands | length > 0
  notify: "cat2_cisc_l2_000150_Fail"

- name: 'Role: Evaluate | Severity: Medium (Cat II) | Group ID: V-220661 | Rule ID: SV-220661r929003 | STIG ID: CISC-L2-000150 | SRG-NET-000362-L2S-000027 |
    DAI | Display missing configuration'
  ansible.builtin.debug:
    msg: "{{ missing_dai_commands }}"

- name: 'Role: Evaluate | DAI | Trigger Pass'
  ansible.builtin.debug:
    msg: "Rule ID: SV-220661r929003 Passed"
  when: missing_dai_commands | length == 0
  changed_when: true
  notify: "cat2_cisc_l2_000150_Pass"
