---
# CISC-L2-000120 - Unknown Unicast Flood Blocking (UUFB) Evaluation 
- name: 'Role: Evaluate | Severity: Medium (Cat II) | Group ID: V-220658 | Rule ID:SV-220658r856280 | STIG ID: CISC-L2-000120 | SRG-NET-000362-L2S-000024 
        | Access UUFB | show run'
  cisco.ios.ios_command:
    commands:
      - 'show run int {{ show_item.name }} | exclude Building configuration...|Current configuration'
  loop: "{{ iosstig_access_ports }}"
  loop_control:
    loop_var: show_item
  register: access_uufb_check
  when: iosstig_access_ports is defined

- name: 'Role: Evaluate | Severity: Medium (Cat II) | Group ID: V-220658 | Rule ID:SV-220658r856280 | STIG ID: CISC-L2-000120 | SRG-NET-000362-L2S-000024 
        | Access UUFB | Identify Missing Configs'
  ansible.builtin.set_fact:
    missing_uufb_interfaces: >-
      {{ access_uufb_check.results | 
         selectattr('stdout', 'defined') | 
         rejectattr('stdout.0', 'search', 'switchport block unicast') | 
         map(attribute='show_item.name') | list | unique }}
  delegate_to: localhost
  changed_when: missing_uufb_interfaces | length > 0
  notify: "cat2_cisc_l2_000120_access_Fail"

- name: "STIG | Show findings | uufb | Access "
  ansible.builtin.debug:
    msg: "The following interfaces are non-compliant: {{ missing_uufb_interfaces }}"
  when: missing_uufb_interfaces | length > 0
  delegate_to: localhost

- name: >
    'Role: Evaluate | Severity: Medium (Cat II) | Group ID: V-220658 | Rule ID:SV-220658r856280  | STIG ID: CISC-L2-000120 | SRG ID: SRG-NET-000362-L2S-000024 | Access UUFB
    Trigger handler if NO DIFF occurred'
  debug:
    msg: "No compliance violation detected for | UUFB | Access, notifying handler that Rule ID: SV-220658r856280 8 Passed"
  when: missing_uufb_interfaces | length == 0
  changed_when: true
  notify: "cat2_cisc_l2_000120_access_Pass"

