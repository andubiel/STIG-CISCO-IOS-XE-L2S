---
# CISC-L2-000250 - User-Facing Port Configuration Evaluation
# This task ensures all untrusted or undefined trunk ports are forced to access mode.
- name: 'Role: Evaluate | Severity: Medium (Cat II) | Group ID: V-220671 | Rule ID: SV-220671r991908 | STIG ID: CISC-L2-000250 | Untrusted Trunks | Initialize Lists'
  ansible.builtin.set_fact:
    untrusted_violators: []

- name: 'Role: Evaluate | Severity: Medium (Cat II) | Group ID: V-220671 | Rule ID: SV-220671r991908 | STIG ID: CISC-L2-000250 | Untrusted Trunks | Get Operational Trunks'
  cisco.ios.ios_command:
    commands:
      - show interfaces trunk
  register: trunk_status_out

- name: 'Role: Evaluate | Severity: Medium (Cat II) | Group ID: V-220671 | Rule ID: SV-220671r991908 | STIG ID: CISC-L2-000250 | Untrusted Trunks | Identify Untrusted Ports'
  ansible.builtin.set_fact:
    untrusted_violators: >-
      {%- set violators = [] -%}
      {# Standardize trusted link names for matching #}
      {%- set trusted_names = iosstig_trusted_trunk_links | map(attribute='name') | list -%}
      
      {%- set trunk_output = trunk_status_out.stdout[0].split('\n') -%}
      {%- for line in trunk_output -%}
        {%- set parts = line.split() -%}
        {# Find lines identifying active trunks (Port, Mode, Encapsulation, Status, Native) #}
        {%- if parts | length >= 4 and parts[3] == 'trunking' -%}
          {%- set p_name = parts[0] -%}
          {# If the active trunk is NOT in the trusted list, it is a violator/untrusted #}
          {%- if p_name not in trusted_names -%}
            {%- set _ = violators.append({'name': p_name, 'status': parts[3]}) -%}
          {%- endif -%}
        {%- endif -%}
      {%- endfor -%}
      {{ violators }}
  delegate_to: localhost

- name: 'Role: Evaluate | Severity: Medium (Cat II) | Group ID: V-220671 | Rule ID: SV-220671r991908 | STIG ID: CISC-L2-000250 | Untrusted Trunks | Trigger Fail'
  ansible.builtin.debug:
    msg: "The following trunks are active but UNTRUSTED: {{ untrusted_violators }}"
  when: untrusted_violators | length > 0
  changed_when: true
  notify: "cat2_cisc_l2_000250_Fail"

- name: 'Role: Evaluate | Severity: Medium (Cat II) | Group ID: V-220671 | Rule ID: SV-220671r991908 | STIG ID: CISC-L2-000250 | Untrusted Trunks | Trigger Pass'
  ansible.builtin.debug:
    msg: "All active trunk links are verified as trusted. Rule ID: SV-220671 Passed."
  when: untrusted_violators | length == 0
  changed_when: true
  notify: "cat2_cisc_l2_000250_Pass"
