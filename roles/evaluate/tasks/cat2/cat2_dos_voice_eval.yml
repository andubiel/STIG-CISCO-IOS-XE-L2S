---
# CISC-L2-000040 Denial of Service Prevention
- name: >
   'Role: Evaluate | Severity: Medium (Cat II) | Group ID: V-220651 | Rule ID:SV-220651r1107171 | STIG ID: CISC-L2-000040 | SRG ID: SRG-NET-000193-L2S-000020 | DOS | Voice
     show run interface'
  cisco.ios.ios_command:
    commands:
      - 'show run int {{ show_item.name }} | exclude Building configuration...|Current configuration'
  loop: "{{ iosstig_voice_ports }}"
  loop_control:
    loop_var: show_item
  register: voice_dos

- name: >
     'Role: Evaluate | Severity: Medium (Cat II) | Group ID: V-220651 | Rule ID:SV-220651r1107171 | STIG ID: CISC-L2-000040 | SRG ID: SRG-NET-000193-L2S-000020 | DOS
     Create clean configuration string'
  ansible.builtin.set_fact:
      missing_dos_voice: >-
        {{ voice_dos.results | 
          selectattr('stdout', 'defined') | 
          rejectattr('stdout.0', 'search', 'service-policy output QOS_POLICY_SWITCHPORT') | 
          map(attribute='show_item.name') | list 
          | unique }}
  delegate_to: localhost
  changed_when: missing_dos_voice | length > 0
  notify: "cat2_cisc_l2_000040_voice_Fail"
 
- name: "STIG | Show findings | DOS | Voice"
  ansible.builtin.debug:
    msg: "The following interfaces are non-compliant: {{ missing_dos_voice }}"
  when: missing_dos_voice | length > 0

- name: >
   'Role: Evaluate | Severity: Medium (Cat II) | Group ID: V-220651 | Rule ID:SV-220651r1107171 | STIG ID: CISC-L2-000040 | SRG ID: SRG-NET-000193-L2S-000020 | DOS
    Trigger handler if NO compliance violation occurred'
  debug:
    msg: "No compliance violation detected for | DOS | Voice, notifying handler that Rule ID: SV-220651r1107171 Passed"
  when: missing_dos_voice | length == 0
  changed_when: true
  notify: "cat2_cisc_l2_000040_voice_Pass"

