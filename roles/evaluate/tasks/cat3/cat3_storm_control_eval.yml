---
# CISC-L2-000160 - Storm Control Evaluation
- name: 'Role: Evaluate | Severity: Low (Cat III) | SV-220662 | Storm Control | Initialize Lists'
  ansible.builtin.set_fact:
    storm_control_violators: []

- name: 'Role: Evaluate | Severity: Low (Cat III) | SV-220662 | Storm Control | Get Interface Configs'
  cisco.ios.ios_command:
    commands:
      - "show run interface {{ item.name }}"
  # Updated to match your provided variable name
  loop: "{{ iosstig_access_ports | default([]) }}" 
  register: storm_config_out
  when: iosstig_access_ports | default([]) | length > 0

- name: 'Role: Evaluate | Severity: Low (Cat III) | SV-220662 | Storm Control | Identify Missing Config'
  ansible.builtin.set_fact:
    storm_control_violators: >-
      {%- set violators = [] -%}
      {%- if storm_config_out.results is defined -%}
        {%- for result in storm_config_out.results -%}
          {%- if not result.skipped | default(false) -%}
            {%- set config = result.stdout[0] -%}
            {# STIG requires broadcast at a minimum #}
            {%- if 'storm-control broadcast' not in config -%}
              {%- set _ = violators.append({'name': result.item.name}) -%}
            {%- endif -%}
          {%- endif -%}
        {%- endfor -%}
      {%- endif -%}
      {{ violators }}
  delegate_to: localhost

- name: 'Role: Evaluate | Severity: Low (Cat III) | SV-220662 | Storm Control | Trigger Fail'
  ansible.builtin.debug:
    msg: "Storm Control is missing on: {{ storm_control_violators }}"
  when: 
    - storm_control_violators | length > 0
    - iosstig_access_ports | default([]) | length > 0
  changed_when: true
  notify: "cat3_cisc_l2_000160_Fail"

- name: 'Role: Evaluate | Severity: Low (Cat III) | SV-220662 | Storm Control | Trigger Pass'
  ansible.builtin.debug:
    msg: "Storm Control is correctly configured. Rule ID: SV-220662 Passed."
  when: 
    - storm_control_violators | length == 0
    - iosstig_access_ports | default([]) | length > 0
  changed_when: true
  notify: "cat3_cisc_l2_000160_Pass"
