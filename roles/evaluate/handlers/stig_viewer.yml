# All STIG Viewer   
- name: "Collect current timestamp"
  ansible.builtin.setup:
    gather_subset:
      - 'date_time'
  delegate_to: localhost
  run_once: true
  listen: 
    - "cat1_cisc_l2_000020_Fail"
    - "cat1_cisc_l2_000020_Pass"
    - "cat1_cisc_l2_000020_access_Fail"
    - "cat1_cisc_l2_000020_access_Pass"
    - "cat1_cisc_l2_000020_voice_Fail"
    - "cat1_cisc_l2_000020_voice_Pass"
    - "cat2_cisc_l2_000030_Fail"
    - "cat2_cisc_l2_000030_Pass"
    - "cat2_cisc_l2_000100_access_Fail"
    - "cat2_cisc_l2_000100_access_Pass"
    - "cat2_cisc_l2_000100_voice_Fail"
    - "cat2_cisc_l2_000100_voice_Pass"

- name: "Role: Evaluate | Create Timestamped CKLB file"
  ansible.builtin.template:
    src: templates/stig_viewer.j2
    dest: "{{ cklb_path }}/{{ inventory_hostname }}_{{ lookup('pipe', 'date +%d%b%y_%H%M') }}.cklb"
    owner: "{{ cklb_user }}"
    group: "{{ cklb_user }}"
    mode: '0644'
  delegate_to: "{{ cklb_server }}"
  listen: 
    - "cat1_cisc_l2_000020_Fail"
    - "cat1_cisc_l2_000020_Pass"
    - "cat1_cisc_l2_000020_access_Fail"
    - "cat1_cisc_l2_000020_access_Pass"
    - "cat1_cisc_l2_000020_voice_Fail"
    - "cat1_cisc_l2_000020_voice_Pass"
    - "cat2_cisc_l2_000030_Fail"
    - "cat2_cisc_l2_000030_Pass"
    - "cat2_cisc_l2_000100_access_Fail"
    - "cat2_cisc_l2_000100_access_Pass"
    - "cat2_cisc_l2_000100_voice_Fail"
    - "cat2_cisc_l2_000100_voice_Pass"
  vars:
    ansible_user: "{{ cklb_user }}"
    ansible_password: "{{ cklb_password }}"
    ansible_become_pass: "{{ cklb_become_pass }}"
    become: true  
 
  

