---
# CAT1 STIG Viewer
- name: |
    'Role: STIG-Viewer | Severity: High (Cat I) | Group ID: V-220649 | Rule ID: SV-220649r863283 | STIG ID: CISC-L2-000020 | SRG ID: SRG-NET-000148-L2S-000015
    Set Status'
  ansible.builtin.set_fact:
    SV_220649_status: not_a_finding
  listen: 
   - "cat1_cisc_l2_000020_auth_Pass"
   - "cat1_cisc_l2_000020_radius_Pass"
   - "cat1_cisc_l2_000020_access_Pass"
   - "cat1_cisc_l2_000020_voice_Pass"
  
- name: |
    'Role: STIG-Viewer | Severity: High (Cat I) | Group ID: V-220649 | Rule ID: SV-220649r863283 | STIG ID: CISC-L2-000020 | SRG ID: SRG-NET-000148-L2S-000015
    Set Status'
  ansible.builtin.set_fact:
    SV_220649_status: open
  listen: 
  - "cat1_cisc_l2_000020_auth_Fail"
  - "cat1_cisc_l2_000020_radius_Fail"
  - "cat1_cisc_l2_000020_access_Fail" 
  - "cat1_cisc_l2_000020_voice_Fail" 

- name: "Handler | Auth Failures"
  ansible.builtin.set_fact:
    SV_220649_findings: |
      {{ SV_220649_findings | default('') }}
      =========================================
      Authentication Configuration FAILURE (802.1X/MAB)
      =========================================}}
  listen: "cat1_cisc_l2_000020_auth_Fail"

- name: "Handler | Radius Failures"
  ansible.builtin.set_fact:
    SV_220649_findings: |
      {{ SV_220649_findings | default('') }}
      =========================================
      Radius Configuration FAILURE (802.1X/MAB)
      =========================================}}
  listen: "cat1_cisc_l2_000020_radius_Fail"

- name: "Handler | Access Failures"
  ansible.builtin.set_fact:
    SV_220649_findings: |
      {{ SV_220649_findings | default('') }}
      =========================================
      ACCESS PORT FAILURE (802.1X/MAB)
      =========================================
      {{ 'The following interfaces are non-compliant: {{ missing_8021x_interfaces }}' | default('') }}
  listen: "cat1_cisc_l2_000020_access_Fail"

- name: "Handler | Voice Failures"
  ansible.builtin.set_fact:
    SV_220649_findings: |
      {{ SV_220649_findings | default('') }}
      =========================================
      VOICE VLAN FAILURE (802.1X/MAB)
      =========================================
      {{ 'The following interfaces are non-compliant: {{ missing_8021x_voice_interfaces }}' | default('') }}
  listen: "cat1_cisc_l2_000020_voice_Fail"

# CAT2 STIG Viewer
- name: |
