    'Role: STIG-Viewer | Severity: Medium (Cat II) | Group ID: V-220650 | Rule ID: SV-220650r539671 | STIG ID: CISC-L2-000030 | SRG ID: SRG-NET-000168-L2S-000019
    SV_220650_status | '
  ansible.builtin.set_fact:
    SV_220650_status: not_a_finding
  listen: "cat2_cisc_l2_000030_Pass"

- name: |
    'Role: STIG-Viewer | Severity: Medium (Cat II) | Group ID: V-220650 | Rule ID: SV-220650r539671 | STIG ID: CISC-L2-000030 | SRG ID: SRG-NET-000168-L2S-000019
     SV_220650_status | '
  ansible.builtin.set_fact:
    SV_220650_status: open
  listen: "cat2_cisc_l2_000030_Fail" 
  
- name: |
    'Role: STIG-Viewer | Severity: Medium (Cat II) | Group ID: V-220650 | Rule ID: SV-220650r539671 | STIG ID: CISC-L2-000030 | SRG ID: SRG-NET-000168-L2S-000019
     SV_220650_findings |'
  ansible.builtin.debug:
