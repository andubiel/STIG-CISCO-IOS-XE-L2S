  listen: "cat2_cisc_l2_000260_Pass"

- name: "Handler | CAT2 | SV-220672 | Native VLAN | Fail"
  ansible.builtin.set_fact:
    SV_220672_status: "open"
    SV_220672_findings: >-
      {%- if not native_vlan_exists | default(false) -%}
        Finding: The required Native VLAN ({{ iosstig_native_vlan }}) does not exist in the VLAN database. 
      {%- endif -%}
      {%- if native_vlan_violators | default([]) | length > 0 -%}
        Finding: The following trunk ports are using an incorrect Native VLAN (likely VLAN 1): 
        {{ native_vlan_violators | map(attribute='name') | list | join(', ') }}.
      {%- endif -%}
  listen: "cat2_cisc_l2_000260_Fail"

