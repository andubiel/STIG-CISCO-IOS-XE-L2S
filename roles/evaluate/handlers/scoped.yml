---

- name: "Scoped | Add 8021x Access interfaces to host_vars"
  ansible.builtin.blockinfile:
    path: "{{ repository['path'] }}/host_vars/{{ inventory_hostname }}/iosstig_scoped.yaml"
    create: yes  # Creates the file if it doesn't exist
    marker: "# {mark} 8021x ACCESS PORTS"
    block: |
      access_8021x:
      {% for iface in missing_8021x_interfaces | default([]) %}
        - name: {{ iface }}
      {% endfor %}
  delegate_to: localhost
  listen: "cat1_cisc_l2_000020_access_Fail"

