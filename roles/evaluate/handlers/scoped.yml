- name: "Scoped | Add Default VLAN 1 Access interfaces to host_vars"
  ansible.builtin.blockinfile:
    path: "{{ repository['path'] }}/host_vars/{{ inventory_hostname }}/iosstig_scoped.yaml"
    marker: "# {mark} DEFAULT VLAN"
    block: |
      vlan1_violators_admin_up:
      {% for port in vlan1_violators_admin_up %}
        {# Check if port is a dictionary with 'name' or just a string #}
        - name: {{ port.name if port is mapping else port }}
      {% endfor %}
    create: yes
  delegate_to: localhost
  listen: "cat2_cisc_l2_000220_Fail"

- name: "Scoped | Add Untrusted ports to host_vars"
