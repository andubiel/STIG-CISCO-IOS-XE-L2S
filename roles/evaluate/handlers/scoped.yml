    marker: "# {mark} NATIVE VLAN"
    block: |
      native_vlan_violators:
      {% for port in native_vlan_violators %}
        - name: {{ port.name }}
      {% endfor %}
      native_vlan_exists_on_switch: {{ native_vlan_exists }}
    create: yes
  delegate_to: localhost
  listen: "cat2_cisc_l2_000260_Fail"

